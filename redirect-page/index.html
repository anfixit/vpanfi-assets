<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex,nofollow" />
        <title>Открываем приложение…</title>
        <style>
            :root {
                color-scheme: dark;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: #0f1419;
                color: #e6edf3;
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 24px;
            }
            .card {
                max-width: 420px;
            }
            h2 {
                margin: 0 0 8px;
                font-size: 20px;
            }
            .muted {
                color: #8b949e;
                font-size: 14px;
                margin: 8px 0;
            }
            a.btn {
                display: inline-block;
                margin-top: 16px;
                padding: 12px 28px;
                background: #2ea043;
                color: #fff;
                border-radius: 10px;
                text-decoration: none;
                font-weight: 600;
            }
            a.btn:active {
                opacity: 0.85;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h2 id="title">Открываем приложение…</h2>
            <p class="muted" id="hint">
                Если приложение не открылось автоматически — нажмите кнопку
                ниже.
            </p>
            <a id="open" class="btn" href="#" rel="noopener"
                >Открыть приложение</a
            >
        </div>
        <script>
            (function () {
                var to = new URLSearchParams(window.location.search).get(
                    "redirect_to",
                );
                var btn = document.getElementById("open");
                if (!to) {
                    document.getElementById("title").textContent =
                        "Ссылка не передана";
                    document.getElementById("hint").textContent =
                        "Откройте подписку из бота заново.";
                    btn.style.display = "none";
                    return;
                }
                // URLSearchParams уже декодирует значение -> here `to` = happ://add/...
                btn.href = to;
                // авто-переход в приложение
                try {
                    window.location.replace(to);
                } catch (e) {
                    window.location.href = to;
                }
            })();
        </script>
    </body>
</html>
